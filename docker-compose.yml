services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecom-app
    container_name: ecom_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ecom
      - DB_USERNAME=root
      - DB_PASSWORD=password
    volumes:
      - ./public/images:/var/www/html/public/images
      - ./public/assets/images:/var/www/html/public/assets/images
      - ./public/invoice_pdf:/var/www/html/public/invoice_pdf
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecom_network

  db:
    image: mysql:8.4
    container_name: ecom_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecom
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ecom_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  ecom_network:
    driver: bridge

volumes:
  dbdata:
