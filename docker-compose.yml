version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ecom-app
    container_name: ecom_app
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ecom
      - DB_USERNAME=root
      - DB_PASSWORD=password
    depends_on:
      - db
    networks:
      - ecom_network

  db:
    image: mysql:8.0
    container_name: ecom_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecom
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ecom_network

networks:
  ecom_network:
    driver: bridge

volumes:
  dbdata:
